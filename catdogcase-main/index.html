<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HTML 文字伪推理游戏（猫狗悬案）v1</title>
<style>
/* ===== 背景左右图与角标 ===== */
.background {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; justify-content: space-between; z-index: -1;
}
.side-bg { position: relative; width: 50%; height: 100%; overflow: hidden; }
.side-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
.image-overlay {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 18px; font-weight: bold; color: white;
  background: rgba(0, 0, 0, 0.55); padding: 12px 20px; border-radius: 8px;
  text-align: center; line-height: 1.6em; white-space: normal; max-width: 40%;
}
.left-overlay { left: 10%; }
.right-overlay { right: 10%; }

/* ===== 主题与布局 ===== */
:root { --bg:#0b0d10; --panel:#12161b; --panel2:#0f1317; --accent:#5eead4; --muted:#8b98a5; --text:#e6edf3; --card:#151a20cc; }
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:radial-gradient(1200px 800px at 80% -10%, #15202b 0%, #0b0d10 50%, #05070a 100%);
  color:var(--text);
  font:16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans";
}
.app{display:grid;grid-template-rows:auto 1fr auto;max-width:1200px;height:100%;margin:0 auto}

.header{
  position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
  padding:12px clamp(12px,4vw,24px);
  backdrop-filter:saturate(1.4) blur(10px);
  background:linear-gradient(180deg,#0b0d10f2,#0b0d10e6 50%,#0b0d10cc 100%);
  border-bottom:1px solid #1f2937
}
.header h1{margin:0;font-size:18px;font-weight:700}
.header .spacer{flex:1}
.btn{
  border:1px solid #1f2937;background:linear-gradient(180deg,#1a2027,#11161c);color:var(--text);
  padding:8px 12px;border-radius:12px;cursor:pointer;outline:none;transition:.18s ease;font-weight:600
}
.btn:hover{transform:translateY(-1px);border-color:#2a3542;box-shadow:0 6px 24px -10px rgba(94,234,212,.25)}
.btn[aria-pressed="true"]{border-color:var(--accent)}
.speed{display:flex;align-items:center;gap:8px;border:1px solid #1f2937;background:#11161c;border-radius:12px;padding:6px 10px}
.speed input{width:180px}
.speed b{font-size:12px;color:#a7b4c3}

.main{display:grid;grid-template-columns:1fr 340px;gap:18px;padding:18px clamp(10px,3.5vw,26px)}
@media(max-width:1024px){.main{grid-template-columns:1fr}}

/* ===== 半透明对话容器 ===== */
.chat{
  background: rgba(18,22,27,0.55);
  border: 1px solid rgba(31,41,55,.7);
  border-radius: 20px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  min-height: 60vh;
  max-height: 76vh;
  overflow: auto;
  box-shadow: inset 0 0 0 1px rgba(14,19,24,.5), 0 60px 120px -60px rgba(0,0,0,.55);
  backdrop-filter: blur(6px) saturate(1.1);
}
.chat::-webkit-scrollbar{width:10px;height:10px}
.chat::-webkit-scrollbar-thumb{background:#1f2937;border-radius:10px}

.row{display:flex;gap:10px;margin:10px 8px;align-items:flex-end}
.row.right{justify-content:flex-end}

/* ===== 放大后的头像 ===== */
.avatar{
  width:68px;height:68px;min-width:68px;border-radius:50%;
  background:#222;background-size:cover;background-position:center;
  border:1px solid #2a3542;box-shadow:0 4px 14px -6px rgba(0,0,0,.8),0 0 0 3px #0b0f14 inset
}

/* ===== 半透明聊天气泡 ===== */
.bubble{
  max-width:min(680px,88%);
  padding:12px 14px;border-radius:16px;
  background: rgba(26,33,41,0.55);
  border:1px solid rgba(34,48,60,.7);
  box-shadow:0 6px 26px -18px rgba(0,0,0,.65);
  backdrop-filter: blur(4px) saturate(1.05);
}
.bubble .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:6px}
.bubble .text{white-space:pre-wrap;word-break:break-word}
.right .bubble{background: rgba(18,32,34,0.55); border-color: rgba(31,58,61,.7);}
.right .bubble .meta{color:#93c5fd}

.tag{
  display:inline-flex;align-items:center;gap:6px;padding:2px 8px;font-size:11px;
  background:#17202a;border:1px solid #243241;border-radius:999px;color:#cbd5e1
}
.tag.evi{background:#0f1e1a;border-color:#1c352d;color:#d1fae5}

/* ===== 页脚/侧栏/模态 ===== */
.footer{
  display:flex;align-items:center;gap:10px;
  padding:16px clamp(12px,4vw,24px);
  border-top:1px solid #1f2937;
  background: rgba(15,19,23,0.6); backdrop-filter: blur(6px) saturate(1.05);
}
.progress{height:10px;flex:1;background:#0d1217;border:1px solid #1f2937;border-radius:999px;overflow:hidden}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,#5eead4,#60a5fa);width:0%;transition:width .3s ease}

.sidebar{
  background: rgba(18,22,27,0.55);
  border:1px solid #1f2937;border-radius:20px;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  backdrop-filter: blur(6px) saturate(1.05);
}
.sidebar h3{margin:4px 4px 8px;font-size:15px;font-weight:700;color:#a7b4c3}
.quick-evi{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.quick-evi .card{
  background: rgba(21,26,32,0.75);
  border:1px solid #1f2937;border-radius:14px;padding:10px;cursor:pointer;transition:.2s ease
}
.quick-evi .card:hover{transform:translateY(-2px);border-color:#314254;box-shadow:0 16px 60px -30px rgba(94,234,212,.25)}
.quick-evi .thumb{aspect-ratio:4/3;border-radius:10px;background:#10161c;border:1px dashed #233140;display:grid;place-items:center;font-size:22px;overflow:hidden}
.quick-evi .thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.quick-evi .ttl{margin-top:8px;font-size:12px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.modal{position:fixed;inset:0;display:none}
.modal[open]{display:grid;place-items:center;background:#000000bf;backdrop-filter:blur(4px)}
.sheet{
  width:min(980px,92vw);max-height:86vh;
  background: rgba(18,22,27,0.75);
  border:1px solid #26313d;border-radius:18px;overflow:hidden;
  display:grid;grid-template-columns:300px 1fr;
  backdrop-filter: blur(6px) saturate(1.05);
}
@media(max-width:900px){.sheet{grid-template-columns:1fr}}
.sheet .list{border-right:1px solid #1f2937;overflow:auto;max-height:86vh}
.sheet .list .item{display:grid;grid-template-columns:60px 1fr;gap:10px;padding:12px;border-bottom:1px solid #17202a;cursor:pointer;align-items:center}
.sheet .list .item:hover{background:#10161b}
.sheet .list .icon{width:56px;height:42px;display:grid;place-items:center;border:1px solid #213040;border-radius:10px;background:#0f141a;overflow:hidden}
.sheet .list .icon img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.sheet .list .name{font-weight:600}.sheet .list .when{font-size:12px;color:#8ea0b2}
.sheet .detail{padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:12px}
.sheet .detail .hero{width:100%;aspect-ratio:16/9;background:#0f141a;border:1px solid #203040;border-radius:12px;display:grid;place-items:center;overflow:hidden}
.sheet .detail .desc{color:#cbd5e1;font-size:14px;line-height:1.7}
.sheet .detail .meta{color:#9fb5c9;font-size:12px}
.close-x{position:absolute;right:18px;top:14px;background:#11161c;border:1px solid #253244;width:36px;height:36px;border-radius:10px;display:grid;place-items:center;cursor:pointer}

/* === 证物画廊（新增） === */
.evi-hero {
  width: 100%;
  background: #0f141a;
  border: 1px solid #203040;
  border-radius: 12px;
  overflow: hidden;
  display: grid;
  grid-template-rows: auto 82px;
  gap: 10px;
  padding: 10px;
}
.evi-hero .main {
  width: 100%; aspect-ratio: 16/9;
  background: #0b1016;
  border-radius: 10px;
  display: grid; place-items: center;
  overflow: hidden;
}
.evi-hero .main img { width: 100%; height: 100%; object-fit: contain; }
.evi-hero .thumbs {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 96px;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.evi-hero .thumb {
  width: 96px; height: 72px; border-radius: 8px;
  background: #0f141a;
  border: 1px solid #22303c;
  overflow: hidden; cursor: pointer;
}
.evi-hero .thumb img { width: 100%; height: 100%; object-fit: cover; }
.evi-hero .thumb.active { outline: 2px solid #5eead4; border-color: #5eead4; }
.evi-cap { margin-top: 6px; font-size: 12px; color: #9fb5c9; }
.evi-notes { color:#cbd5e1; font-size:14px; line-height:1.7; white-space:pre-wrap; }

/* 系统条 */
.system-row{justify-content:center}
.system-note{
  font-size:16px;color:#e6f0f8;background:rgba(14,20,26,.75);
  border:1px dashed #31c3b5;padding:10px 14px;border-radius:999px;
  box-shadow:0 10px 30px -20px rgba(94,234,212,.35);
  backdrop-filter: blur(4px);
}

/* 分支列表 */
.branch-list{display:grid;grid-template-columns:1fr;gap:10px;padding:12px}
.branch-list .opt{
  background:rgba(21,26,32,.75);border:1px solid #1f2937;padding:12px;border-radius:12px;cursor:pointer;color:#e6edf3;
  backdrop-filter: blur(4px);
}
.branch-list .opt:hover{border-color:#314254;box-shadow:0 16px 60px -30px rgba(94,234,212,.25)}

/* 选择栏：居中+显眼（包含“下一条”按钮） */
.choicebar{
  position:sticky;bottom:0;display:flex;justify-content:center;gap:12px;padding:12px 14px;flex-wrap:wrap;
  background: rgba(15,19,23,0.6); border-top:1px solid rgba(31,41,55,.65);
  backdrop-filter: blur(10px) saturate(1.1); z-index:5;
}
.choicebar .choice{
  background:linear-gradient(180deg, rgba(26,32,39,.85), rgba(17,22,28,.85));
  border:1px solid rgba(94,234,212,.4); border-radius:14px; padding:12px 18px; cursor:pointer;
  color:#e6edf3; font-size:18px; font-weight:800;
  box-shadow:0 10px 30px -18px rgba(94,234,212,.35), inset 0 0 0 1px rgba(255,255,255,.03);
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}
.choicebar .choice:hover{
  transform:translateY(-1px) scale(1.02);
  border-color:rgba(94,234,212,.7);
  box-shadow:0 18px 60px -30px rgba(94,234,212,.45), inset 0 0 0 1px rgba(255,255,255,.06);
}

/* —— 底部“下一条”（偏右对齐） —— */
#nextBtn{
  margin-left:auto;
  background:linear-gradient(180deg, #1a2027, #11161c);
  border:1px solid rgba(94,234,212,.4);
  border-radius:14px;
  padding:12px 18px;
  cursor:pointer;
  color:#e6edf3;
  font-size:16px;
  font-weight:700;
  box-shadow:0 10px 30px -18px rgba(94,234,212,.35), inset 0 0 0 1px rgba(255,255,255,.03);
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}
#nextBtn:hover{
  transform:translateY(-1px) scale(1.02);
  border-color:rgba(94,234,212,.7);
  box-shadow:0 18px 60px -30px rgba(94,234,212,.45), inset 0 0 0 1px rgba(255,255,255,.06);
}
#nextBtn:disabled{
  opacity:.55; cursor:not-allowed; filter:grayscale(.15);
}

small.hint{color:#8ea0b2}

/* ===== 新增：红色高亮样式 ===== */
.hl-red{ color:#ff4d4f; font-weight:800; }
</style>
</head>
<body>
<!-- 背景左右图 -->
<div class="background">
  <div class="side-bg">
    <img src="bg1.png" />
    <div class="image-overlay left-overlay">
      证物图片等由AI辅助生成，<br>其他OC图片为私人图片请勿使用。<br>by青灯不弈
    </div>
  </div>
  <div class="side-bg">
    <img src="bg2.jfif" />
    <div class="image-overlay right-overlay">
      证物图片等由AI辅助生成，<br>其他OC图片为私人图片请勿使用。<br>by青灯不弈
    </div>
  </div>
</div>

<div class="app"> 
  <div class="header">
    <h1>猫狗宇宙·第一悬案</h1>
    <a class="hint" href="https://space.bilibili.com/95687310?spm_id_from=333.1007.0.0" target="_blank">
      <img src="https://www.bilibili.com/favicon.ico" alt="Bilibili" style="width:20px;height:20px;vertical-align:middle;">
    </a>
    <div class="spacer"></div>

    <!-- 播放速度 -->
    <div class="speed" style="margin-right:8px;">
      <b>播放</b>
      <input id="speedRange" type="range" min="800" max="5000" step="100" value="3000" />
      <b id="speedLabel">3.0 s/条</b>
    </div>
    <!-- 打字速度（字符/秒） -->
    <div class="speed">
      <b>打字</b>
      <input id="typeRange" type="range" min="10" max="120" step="5" value="40" />
      <b id="typeLabel">40 字/秒</b>
    </div>

    <button id="btn-evi" class="btn">证物</button>
    <button id="btn-branch" class="btn">选择分支</button>
    <button id="btn-auto" class="btn" aria-pressed="false">自动播放</button>
    <button id="btn-replay" class="btn">回放</button>
    <button id="btn-reset" class="btn">重置</button>
  </div>

  <div class="main">
    <div class="chat" id="chat"></div>
    <aside class="sidebar">
      <h3>关键证物（快捷预览）</h3>
      <div id="quickEvi" class="quick-evi"></div>
    </aside>
  </div>

  <!-- 底部选择栏 -->
  <div class="choicebar" id="choicebar">
    <button id="nextBtn" type="button">下一条</button>
  </div>

  <div class="footer">
    <div class="progress"><i id="bar"></i></div>
    <div id="status" class="hint"></div>
  </div>
</div>

<!-- 证物弹窗 -->
<dialog id="eviModal" class="modal">
  <div class="sheet">
    <div class="list" id="eviList"></div>
    <div class="detail">
      <div class="hero" id="eviHero"></div>
      <div class="desc" id="eviDesc"></div>
      <div class="meta" id="eviMeta"></div>
    </div>
  </div>
  <div class="close-x" id="closeEvi">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 6l12 12M18 6L6 18" stroke="#a7b4c3" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
</dialog>

<!-- 分支弹窗 -->
<dialog id="branchModal" class="modal">
  <div class="sheet" style="grid-template-columns:1fr; width:min(680px,92vw)">
    <div class="detail">
      <div class="desc">选择一个推理分支（不会改变主线，只会插入额外讨论）：</div>
      <div class="branch-list">
        <div class="opt" data-branch="密室派">密室派：从“虫子进不来”为前提，论证密室合理性</div>
        <div class="opt" data-branch="老鼠派">老鼠派：从“黑色颗粒=鼠屎”为前提，论证老鼠致因</div>
        <div class="opt" data-branch="自然派">自然派：从“夏季闷热+潮湿”出发，讨论自然腐败与时间线</div>
      </div>
    </div>
  </div>
  <div class="close-x" id="closeBranch">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 6l12 12M18 6L6 18" stroke="#a7b4c3" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
</dialog>

<script>
/* ===== 简易报错浮层 ===== */
window.addEventListener('error', (e)=>{
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:12px;z-index:9999;background:#170e0e;border:1px solid #3a1f1f;color:#ffd2d2;border-radius:12px;padding:12px;font:14px/1.6 ui-sans-serif';
  div.innerHTML='<b>脚本异常</b><br>'+ (e.message||'未知错误');
  document.body.appendChild(div);
});
window.addEventListener('unhandledrejection', (e)=>{
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:12px;z-index:9999;background:#170e0e;border:1px solid #3a1f1f;color:#ffd2d2;border-radius:12px;padding:12px;font:14px/1.6 ui-sans-serif';
  div.innerHTML='<b>未处理的 Promise 异常</b><br>'+ (e.reason&&e.reason.message?e.reason.message:String(e.reason));
  document.body.appendChild(div);
});

window.addEventListener('DOMContentLoaded', () => {
  const chatEl = document.getElementById('chat');
  const bar = document.getElementById('bar');
  const statusEl = document.getElementById('status');
  const btn_auto = document.getElementById('btn-auto');
  const btn_evi  = document.getElementById('btn-evi');
  const btn_reset  = document.getElementById('btn-reset');
  const btn_replay = document.getElementById('btn-replay');
  const btn_branch = document.getElementById('btn-branch');
  const nextBtn = document.getElementById('nextBtn');
  const eviModal = document.getElementById('eviModal');
  const branchModal = document.getElementById('branchModal');
  const closeEvi = document.getElementById('closeEvi');
  const closeBranch = document.getElementById('closeBranch');
  const choicebar = document.getElementById('choicebar');
  const speedRange = document.getElementById('speedRange');
  const speedLabel = document.getElementById('speedLabel');
  const typeRange = document.getElementById('typeRange');
  const typeLabel = document.getElementById('typeLabel');

  function getSpeed(){ return Number(speedRange && speedRange.value || 3000); }
  function fmtMs(ms){return (ms/1000).toFixed(1)+ ' s/条'}
  function updateSpeedLabel(){ if(speedLabel) speedLabel.textContent = fmtMs(getSpeed()); }

  function getTypeCPS(){ return Number(typeRange && typeRange.value || 40); } // chars per second
  function getTypeDelay(){ return 1000 / Math.max(1, getTypeCPS()); }
  function updateTypeLabel(){ if(typeLabel) typeLabel.textContent = getTypeCPS() + ' 字/秒'; }

  // 头像 GIF
  const Avatars = {
    狗: "dog.gif",
    猫: "cat.gif",
    人女: "https://i.postimg.cc/8zFQq0ZZ/Image-1755523606747.png",
    人男: "https://i.postimg.cc/Qxdrqt1G/Image-1755523609402.png",
    父母: "https://i.postimg.cc/3xhfZfPy/1755521655008.png",
    旁白: ""
  };

  const roleMap = {
    "警探狗": { side:"right", avatar: Avatars.狗, label:"警探狗" },
    "第一发现人猫": { side:"left", avatar: Avatars.猫, label:"第一发现人猫" },
    "屋主猫": { side:"left", avatar: Avatars.猫, label:"屋主猫" },
    "无辜的保洁": { side:"left", avatar: Avatars.人女, label:"无辜的保洁" },
    "第一发现人保洁": { side:"left", avatar: Avatars.人女, label:"无辜的保洁" },
    "专业灭鼠人": { side:"left", avatar: Avatars.人男, label:"专业灭鼠人" },
    "猫父母": { side:"left", avatar: Avatars.父母, label:"猫父母" },
    "场外音": { side:"center", avatar: Avatars.旁白, label:"场外音" },
    "系统": { side:"center", avatar: Avatars.旁白, label:"系统" }
  };

  function avatarFor(who){
    if(who.includes('警探狗')) return roleMap['警探狗'].avatar;
    if(who.includes('第一发现人保洁')) return roleMap['第一发现人保洁'].avatar;
    if(who.includes('第一发现人猫') || who.includes('屋主猫')) return roleMap['屋主猫'].avatar;
    if(who.includes('无辜的保洁')) return roleMap['无辜的保洁'].avatar;
    if(who.includes('专业灭鼠人')) return roleMap['专业灭鼠人'].avatar;
    if(who.includes('猫父母')) return roleMap['猫父母'].avatar;
    return roleMap['场外音'].avatar;
  }
  function sideFor(who){ return who.includes('警探狗') ? 'right':'left'; }

  /* ===== WebAudio：喵/汪/打字声音 ===== */
  const SFX = (()=>{
    let ctx;
    function ac(){ return ctx || (ctx = new (window.AudioContext||window.webkitAudioContext)()); }

    function envGain(time, attack=0.005, hold=0.04, release=0.08, peak=0.06){
      const a = ac(); const gain=a.createGain(); const now=a.currentTime+ (time||0);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(peak, now+attack);
      gain.gain.setValueAtTime(peak, now+attack+hold);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+attack+hold+release);
      return {a, gain, dur:attack+hold+release};
    }

    function meowShort(){
      const {a, gain, dur} = envGain(0, 0.005, 0.07, 0.12, 0.08);
      const o = a.createOscillator(); o.type='triangle';
      o.frequency.setValueAtTime(660, a.currentTime);
      o.frequency.exponentialRampToValueAtTime(420, a.currentTime+dur*0.9);
      const lfo=a.createOscillator(); const lGain=a.createGain();
      lfo.frequency.value=6; lGain.gain.value=10; lfo.connect(lGain); lGain.connect(o.frequency);
      o.connect(gain); gain.connect(a.destination); o.start(); lfo.start();
      o.stop(a.currentTime+dur); lfo.stop(a.currentTime+dur);
    }

    function barkShort(){
      const a = ac();
      const buffer=a.createBuffer(1, a.sampleRate*0.08, a.sampleRate);
      const data=buffer.getChannelData(0);
      for(let i=0;i<data.length;i++){ data[i]=(Math.random()*2-1)*(1 - i/data.length); }
      const src=a.createBufferSource(); src.buffer=buffer;
      const bp=a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=450; bp.Q.value=0.8;
      const g1=a.createGain(); g1.gain.value=0.2;
      src.connect(bp); bp.connect(g1); g1.connect(a.destination); src.start();

      const {gain, dur}=envGain(0, 0.003, 0.05, 0.07, 0.12);
      const o=a.createOscillator(); o.type='square'; o.frequency.setValueAtTime(220, a.currentTime);
      o.frequency.exponentialRampToValueAtTime(160, a.currentTime+dur*0.9);
      o.connect(gain); gain.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
    }

    function typeClick(){
      const {a, gain, dur}=envGain(0, 0.001, 0.01, 0.02, 0.05);
      const o=a.createOscillator(); o.type='square'; o.frequency.value=1500;
      o.connect(gain); gain.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
    }

    return { meowShort, barkShort, typeClick };
  })();

  function mdToHTML(s){
    const safe = String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    // 双星号高亮
    return safe.replace(/\*\*(.+?)\*\*/g, '<span class="hl-red">$1</span>');

  /* ===== 打字渲染 ===== */
  function typeText(el, fullText, onStart, onEnd){
    if(!el){ if(typeof onEnd==='function') onEnd(); return; }
    el.textContent = '';
    const delay = Math.max(8, Number((typeof getTypeDelay==='function' && getTypeDelay()) || 30));
    let idx = 0;
    if(typeof onStart === 'function') onStart();

    const timer = setInterval(()=>{
      const cps   = Math.max(1, Number((typeof getTypeCPS==='function' && getTypeCPS()) || 30));
      const chunk = Math.max(1, Math.round(cps / (1000 / delay)));
      const next = fullText.slice(idx, idx + chunk);
      if(next.length){
        el.textContent += next;
        if (SFX && typeof SFX.typeClick === 'function') SFX.typeClick();
        idx += next.length;
      }
      if(idx >= fullText.length){
        clearInterval(timer);
        // —— 完整打字后再把 **高亮** 替换成红色 span —— //
        el.innerHTML = mdToHTML(fullText);
        if(typeof onEnd === 'function') onEnd();
      }
      const chat = el.closest('.chat');
      if(chat) chat.scrollTo({ top: chat.scrollHeight, behavior: 'auto' });
    }, delay);
  }

  const evidence = new Map();
  function baseTitle(t){ return String(t||'').replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim(); }

    if(/合同|文件|档案|纸|字条|笔记/.test(name)) return '📄';
    if(/天气|风|雨|雪|云|气温/.test(name)) return '⛅';

    if(/猫粮|罐头|鱼|食物|餐/.test(name)) return '🍖';
    if(/下水|疏通|水管|污水|药剂|化学|液体/.test(name)) return '🧪';
    if(/半地下|地下|结构|门窗|密室|屋子|楼|楼梯|房/.test(name)) return '🏠';
    if(/钥匙|锁|门锁|开锁/.test(name)) return '🔑';
    if(/手机|电话|通话/.test(name)) return '📱';
    if(/钱|现金|票据|账单/.test(name)) return '💰';
    if(/时间|钟|表|日记/.test(name)) return '⏰';
    if(/鞋|脚印|衣服|布/.test(name)) return '👟';
    if(/武器|刀|匕首|剪刀|棍/.test(name)) return '🔪';
    if(/酒|饮料|瓶子|罐子/.test(name)) return '🍾';
    if(/指纹|掌印|痕迹|DNA/.test(name)) return '🖐️';
    return '🧩';
  }

  function ensureEvidence(name, idx){
    if(!name) return;
    const id = baseTitle(name);
    if(!evidence.has(id)){
      evidence.set(id, {
        id, title: id, emoji: pickIcon(id),
        firstIndex: idx ?? 0,
        images: [],
        notes:  [],
        updates:[]
      });
    }
    const e = evidence.get(id);
    const extra = (String(name).match(/（(.*)）/)||[])[1];
    if(extra) e.notes.push(extra);
    return e;
  }
  function addEvi(arr, idx){ (arr||[]).forEach(n=> ensureEvidence(n, idx)); renderQuick(); systemNote('新增证物：'+(arr||[]).map(baseTitle).join('、')); }
  function updateEvi(arr, idx){ (arr||[]).forEach(n=>{ const e = ensureEvidence(n, idx); if(e) e.updates.push({at:idx}); }); renderQuick(); systemNote('更新证物：'+(arr||[]).map(baseTitle).join('、')); }

  function addEviDetail(name, detail, idx){
    const e = ensureEvidence(name, idx);
    if(!e) return;
    if(detail?.images?.length){
      detail.images.forEach(img=>{ if(img?.src) e.images.push({src: img.src, cap: img.cap||''}); });
    }
    if(detail?.notes?.length){ detail.notes.forEach(n=>{ if(n) e.notes.push(String(n)); }); }
    e.updates.push({at: idx ?? 0, note:'add-detail'});
    renderQuick();
  }
  function updateEviDetail(name, detail, idx){
    const e = ensureEvidence(name, idx);
    if(!e) return;
    if(detail?.images?.length){
      detail.images.forEach(img=>{ if(img?.src) e.images.push({src: img.src, cap: img.cap||''}); });
    }
    if(detail?.notes?.length){ e.notes.push(...detail.notes.map(String)); }
    e.updates.push({at: idx ?? 0, note:'update-detail'});
    renderQuick(); systemNote('更新证物：'+ baseTitle(name));
  }

  /* ===== 剧本解析：场外音→narr，证物格式照旧 ===== */
  function parseScript(raw){
    const src = (raw && raw.length>10) ? raw : "【第一发现人猫】:我进屋就闻到了异味……";
    const lines = src.split(/\r?\n+/).map(s=>s.trim()).filter(Boolean);
    const entries = [];
    lines.forEach(line=>{
      if(/^【(添加证物|更新证物)/.test(line)){
        const isUpd = line.startsWith('【更新证物');
        const inside = line.replace(/^【(添加证物|更新证物)[：:]/,'').replace(/】$/,'').trim();
        const items = inside.split(/[，,]/).map(s=>s.trim()).filter(Boolean);
        entries.push({type:isUpd? 'update-evi':'add-evi', payload:items}); return;
      }
      if(/^【[^】]+】/.test(line)){
        const head = (line.match(/^【([^】]+)】/)||['','场外音'])[1].trim();
        const text = line.replace(/^【[^】]+】[：:]/,'');
        entries.push({type:'msg', who:head, text}); return;
      }
      if(/^（.*）$/.test(line) || /^后日谈/.test(line)){
        entries.push({type:'narr', text: line.replace(/^（|）$/g,'')}); return;
      }
      entries.push({type:'narr', text: line});
    });
    return entries;
  }

      { src: 'dong.png', cap:'拖出冰箱后才可见；疑似被咬破坏' }
    ],
    notes: [
      '疑为老鼠破坏形成的穿孔，可能作为进出路径。',
      '但洞口处未见明显拖痕/血迹，需与动线进一步交叉验证。',
      '拖出冰箱后才可见；疑似被咬破坏'
    ]
  }, i);
}

// 17) 蟑螂和老鼠的区别
if(e.payload.some(n=>/蟑螂和老鼠的区别/.test(n))){
  addEviDetail('蟑螂和老鼠的区别', {
    notes: [
      '对比表：破坏力/体液痕迹/残留物',
      '老鼠能咬穿结构，蟑螂不能。',
      '结合冰箱窟窿，老鼠路径更合理。'
    ]
  }, i);
}

// 18) 灭鼠包年合同
if(e.payload.some(n=>/灭鼠包年合同/.test(n))){
  addEviDetail('灭鼠包年合同', {
    notes: [
      '合同与上门单据',
      '约定后续免费上门，含鼠尸处理。'
    ]
  }, i);
}

// 19) 丢弃的沙发
if(e.payload.some(n=>/丢弃的沙发/.test(n))){
  addEviDetail('丢弃的沙发', {
    notes: [
      '与专业人员搬运丢弃',
      '污染源家具已移除，利于清洁与去味。'
    ]
  }, i);
}

// 20) 完好无损的猫粮
if(e.payload.some(n=>/完好无损的猫粮/.test(n))){
  addEviDetail('完好无损的猫粮', {
    images: [
      { src: 'maoliang.png', cap:'袋体未见破损或啃咬痕迹' }
    ],
    notes: [
      '排除“猫粮被啃食→中毒/过饱致死”类推测；袋体无痕迹支撑。',
      '袋体未见破损或啃咬痕迹'
    ]
  }, i);
}

    } else if(e && e.type==='update-evi'){
      updateEvi(e.payload, i);
    } else if(e && e.type==='narr'){
      systemNote(e.text||'');
    }
    i++; renderProgress();
  }

  function play(){
    clearInterval(timer);
    timer = setInterval(()=>{
      if(!auto || waitingDogChoice){ clearInterval(timer); return; }
      step();
      if(i>=entries.length){ clearInterval(timer); }
    }, getSpeed());
  }
  function resetAll(){
    clearInterval(timer);
    chatEl.innerHTML='';
    i=0; auto=false; waitingDogChoice=false;
    evidence.clear(); renderQuick(); renderProgress();
    btn_auto && btn_auto.setAttribute('aria-pressed','false');
    systemNote('已重置至开头');
    if(nextBtn) nextBtn.disabled=false;
  }
  function replay(){ resetAll(); auto=true; btn_auto && btn_auto.setAttribute('aria-pressed','true'); step(); play(); }

  // 交互
  nextBtn && nextBtn.addEventListener('click', ()=>{
    if(waitingDogChoice) return;
    auto=false; btn_auto && btn_auto.setAttribute('aria-pressed','false');
    step();
  });
  btn_auto && btn_auto.addEventListener('click', ()=>{
    if(waitingDogChoice){ return; }
    auto = !auto;
    btn_auto.setAttribute('aria-pressed', String(auto));
    if(auto){ play(); } else { clearInterval(timer); }
  });
  btn_evi && btn_evi.addEventListener('click', ()=> openEvi());
  btn_reset && btn_reset.addEventListener('click', resetAll);
  btn_replay && btn_replay.addEventListener('click', replay);
  speedRange && speedRange.addEventListener('input', ()=>{ updateSpeedLabel(); if(auto){ play(); } });
  typeRange && typeRange.addEventListener('input', ()=> updateTypeLabel());

  /* ===== 分支选择 ===== */
  function insertBranch(key){
    const pack = {
      '密室派': [
        {type:'msg', who:'警探狗', text:'支线：密室派——若虫子与蟑螂都难以入内，老鼠如何进入？请给出最合理路径。'},
        {type:'msg', who:'第一发现人猫', text:'可能路径一：冰箱旁的窟窿 → 厨房 → 客厅；但洞口处缺少拖痕。'}
      ],
      '老鼠派': [
        {type:'msg', who:'警探狗', text:'支线：老鼠派——以“黑色颗粒=鼠屎”为前提，推演血迹形成。'},
        {type:'msg', who:'第一发现人猫', text:'推演：负伤后从客厅中央拖行至沙发后方死亡，气味集中与拖痕相符。'}
      ],
      '自然派': [
        {type:'msg', who:'警探狗', text:'支线：自然派——考虑夏季高温+潮湿对腐败速度的影响。'},
        {type:'msg', who:'第一发现人猫', text:'两周不在家、半地下、闷热：腐败显著加速，虫蛆出现合理。'}
      ]
    }[key] || [];
    if(pack.length){ systemNote('插入分支：'+key); entries.splice(i, 0, ...pack); renderProgress(); }
  }
  btn_branch && btn_branch.addEventListener('click', ()=> branchModal && branchModal.setAttribute('open',''));
  closeBranch && closeBranch.addEventListener('click', ()=> branchModal && branchModal.removeAttribute('open'));
  branchModal && branchModal.addEventListener('click', (e)=>{
    const t = e.target.closest && e.target.closest('.opt'); if(!t) return;
    const key = t.getAttribute('data-branch'); insertBranch(key);
    branchModal.removeAttribute('open');
  });

  // 启动
  updateSpeedLabel(); updateTypeLabel();
  step();
  renderQuick();
});
</script>
</body>
</html>
